<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalyst Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>

        .bg-dots {
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="bg-[#030303] text-white font-sans antialiased selection:bg-blue-600">

   <section class="max-w-[1200px] m-auto">
    <header class="max-w-[1200px] mx-auto px-6 py-6 flex items-center justify-between">

        <div class="flex items-center space-x-3">
            <div class="font-bold text-xl tracking-tight flex items-center gap-2">
                <span class="border border-white/20 p-1.5 rounded bg-zinc-900 font-mono text-sm">CA</span>
                <div>
                    <p class="leading-none text-base font-extrabold tracking-wide">Catalyst</p>
                    <p class="leading-none text-xs text-gray-400 font-medium tracking-wider">Analytics</p>
                </div>
            </div>
        </div>
        

        <nav class="hidden md:flex items-center space-x-8 text-sm font-medium text-gray-400">
            <a href="#" class="text-white hover:text-white transition">Home</a>
            <a href="#" class="hover:text-white transition">Services</a>
            <a href="#" class="hover:text-white transition">Careers</a>
            <a href="#" class="hover:text-white transition">Career Details</a>
            <a href="#" class="hover:text-white transition">Contact</a>
        </nav>
        

        <div>
            <a href="#" class="bg-[#1D4ED8] hover:bg-blue-600 text-white px-5 py-2.5 rounded-lg text-sm font-semibold shadow-lg shadow-blue-500/20 transition duration-300">
                Contact Us
            </a>
        </div>
    </header>

    <hr class="border-zinc-900">


    <main class="relative bg-dots min-h-[80vh] flex items-center">

        <div class="absolute right-10 bottom-10 w-[400px] h-[400px] bg-blue-900/20 blur-[120px] rounded-full pointer-events-none"></div>
        
        <div class="max-w-[1200px] mx-auto px-6 py-16 grid grid-cols-1 lg:grid-cols-12 gap-12 items-center w-full">
            

            <div class="lg:col-span-7 space-y-8 z-10">
                <h1 class="text-5xl md:text-6xl font-extrabold tracking-tight leading-[1.15]">
                    Transforming Data <br>
                    into <span class="inline-block bg-[#1D4ED8] text-white px-4 py-1 rounded-xl mt-2 shadow-lg shadow-blue-500/10">Decisions</span>
                </h1>
                
                <p class="text-gray-400 text-lg md:text-xl max-w-xl font-light leading-relaxed">
                    Leverage the power of machine learning and AI to unlock insights and drive business growth.
                </p>
                

                <div>
                    <a href="#" class="inline-block bg-[#1D4ED8] hover:bg-blue-600 text-white px-6 py-3.5 rounded-xl font-semibold shadow-lg shadow-blue-500/30 ">
                        Book a Meeting
                    </a>
                </div>
                

                <div class="flex items-center space-x-3 pt-4">
                    <div class="flex -space-x-2">
                        <img class="w-8 h-8 rounded-full border-2 border-[#030303] bg-zinc-700" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100&h=100&fit=crop&crop=faces" alt="User 1">
                        <img class="w-8 h-8 rounded-full border-2 border-[#030303] bg-zinc-600" src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100&h=100&fit=crop&crop=faces" alt="User 2">
                        <img class="w-8 h-8 rounded-full border-2 border-[#030303] bg-zinc-500" src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100&h=100&fit=crop&crop=faces" alt="User 3">
                    </div>
                    <p class="text-xs text-gray-500">
                        Over <span class="text-gray-300 font-semibold">100+ clients</span> have worked with us
                    </p>
                </div>
            </div>
            

            <div class="lg:col-span-5 flex justify-center lg:justify-end relative z-10">

                <div class="relative max-w-[420px] w-full aspect-square flex items-center justify-center">

                    <div class="absolute inset-0 bg-gradient-to-tr from-purple-600/10 to-transparent rounded-full blur-3xl "></div>
                    <span class="text-zinc-600 text-sm absolute bottom-0"></span>
                    <div class="w-full h-full rounded-2xl flex items-center justify-center overflow-hidden">
                        <div class="text-center p-6">
                           <img class="w-[1000px] h-[700px]" src="img/robot area.png" alt="">
                        </div>
                    </div>
                </div>
            </div>
            
        </div>
    </main>

    <footer class="border-t border-zinc-900 bg-[#030303]">
        <div class="max-w-7xl mx-auto px-6 py-12">
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-8 items-center justify-items-center opacity-60 grayscale hover:opacity-80 transition duration-300">

                <img src="img/Card.png" alt="">
                 <img src="img/Logo (5).png" alt="">
                 <img src="img/Logo (6).png" alt="">               
                  <img src="img/Card (1).png" alt="">
                   <img src="img/Logo (7).png" alt="">
                    <img src="img/Card (2).png" alt="">

                </div>
        </div>
    </footer>

    </section>

</body>
</html>
