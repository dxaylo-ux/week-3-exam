<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dokument</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>

        .bg-dots {
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="bg-[#030303] text-white font-sans antialiased selection:bg-blue-600">

    <header class="max-w-[1200px] mx-auto px-6 py-6 flex items-center justify-between">

        <div class="flex items-center space-x-3">
            <div class="font-bold text-xl tracking-tight flex items-center gap-2">
                <span class="border border-white/20 p-1.5 rounded bg-zinc-900 font-mono text-sm">CA</span>
                <div>
                    <p class="leading-none text-base font-extrabold tracking-wide">Catalyst</p>
                    <p class="leading-none text-xs text-gray-400 font-medium tracking-wider">Analytics</p>
                </div>
            </div>
        </div>
        

        <nav class="hidden md:flex items-center space-x-8 text-sm font-medium text-gray-400">
            <a href="#" class=" hover:text-white transition">Home</a>
            <a href="#" class="hover:text-white transition ">Services</a>
            <a href="#" class="hover:text-white transition">Careers</a>
            <a href="#" class="hover:text-white  transition">Career Details</a>
            <a href="#" class="hover:text-white transition text-white">Contact</a>
        </nav>
        

        <div>
            <a href="#" class="bg-[#1D4ED8] hover:bg-blue-600 text-white px-5 py-2.5 rounded-lg text-sm font-semibold shadow-lg shadow-blue-500/20 transition duration-300">
                Contact Us
            </a>
        </div>
    </header>

 <section class="max-w-[1200px] m-auto py-20 px-6 min-h-screen flex flex-col items-center justify-center font-sans">
    
    <div class="relative max-w-6xl w-full bg-[#0d0d0d] border border-zinc-900 rounded-[40px] p-8 md:p-16 overflow-hidden grid grid-cols-1 lg:grid-cols-12 gap-8 items-center mb-8">
        
        <div class="absolute inset-0 opacity-5 pointer-events-none select-none">
            <svg class="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <pattern id="career-grid" width="30" height="30" patternUnits="userSpaceOnUse">
                        <path d="M 30 0 L 0 0 0 30" fill="none" stroke="currentColor" stroke-width="0.5"/>
                    </pattern>
                </defs>
                <rect width="100%" height="100%" fill="url(#career-grid)" />
            </svg>
        </div>
        <div class="absolute left-0 top-0 bottom-0 w-1/2 opacity-20 pointer-events-none hidden md:block">
            <div class="absolute top-8 left-12 w-40 h-32 border-l border-t border-gray-500 rounded-tl-3xl"></div>
            <div class="absolute top-20 left-24 w-56 h-40 border-l border-t border-gray-500 rounded-tl-3xl"></div>
            <div class="absolute bottom-12 left-40 w-44 h-44 border-l border-b border-gray-500 rounded-bl-3xl"></div>
        </div>

        <div class="lg:col-span-7 space-y-6 relative z-10">
            <h2 class="text-3xl md:text-5xl font-extrabold tracking-tight">
               Contact Us
            </h2>
            <p class="text-gray-400 text-sm md:text-base font-light leading-relaxed max-w-xl">
Get in touch with our team to discuss how we can help transform your business.
We’re here to help.            </p>
            <div class="pt-2">
                <a href="#" class="inline-block bg-[#1D4ED8] hover:bg-blue-600 text-white px-6 py-3.5 rounded-xl font-semibold shadow-lg shadow-blue-500/20 transition duration-300">
                   Get In Touch Now
                </a>
            </div>
        </div>

        <div class="lg:col-span-5 flex justify-center lg:justify-end relative z-10">
            <div class="relative max-w-[320px] w-full aspect-square flex items-center justify-center">
                <div class="w-full h-full rounded-3xl flex flex-col items-center justify-center text-center p-6">
                  <img src="img/3c05fef809f4be825780230b2fb21e763df8c5fe.png" alt="">
                </div>
            </div>
        </div>
    </div>

    

</section>
